services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eod_settlement
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/migrations/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/eod_settlement
      OUTPUT_DIR: /app/generated_files
      EOD_FILE_PREFIX: NSI_SETTLEMENT
      CORS_ORIGINS: '["http://localhost:5173"]'
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
