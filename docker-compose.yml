services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OUTPUT_DIR: /app/generated_files
      EOD_FILE_PREFIX: NSI_SETTLEMENT
      CORS_ORIGINS: '["http://localhost:5173"]'
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend


